name: Continuous Integration

on: [ pull_request, push, workflow_dispatch ]

jobs:

  gnu:
    strategy:
      fail-fast: false

      matrix:
        include:
          - image: macos-latest
            config: "debug"
            link: "dynamic"
            cc: ""
            cxx: ""
            flags: ""
            coverage: ""
            boost: "--build-boost"
            secp256k1: "--build-secp256k1"
            options: " --enable-isystem"

          - image: macos-latest
            config: "debug"
            link: "static"
            cc: ""
            cxx: ""
            flags: ""
            coverage: ""
            boost: "--build-boost"
            secp256k1: "--build-secp256k1"
            options: " --enable-isystem"

          - image: ubuntu-24.04
            config: "debug"
            link: "dynamic"
            cc: "clang-18"
            cxx: "clang++-18"
            flags: ""
            coverage: ""
            boost: "--build-boost"
            secp256k1: "--build-secp256k1"
            options: " --enable-isystem"

          - image: ubuntu-24.04
            config: "release"
            link: "static"
            cc: "clang-18"
            cxx: "clang++-18"
            flags: ""
            coverage: ""
            boost: "--build-boost"
            secp256k1: "--build-secp256k1"
            options: " --enable-isystem"

          - image: ubuntu-24.04
            config: "release"
            link: "dynamic"
            cc: "gcc-12"
            cxx: "gcc++-12"
            flags: ""
            coverage: ""
            boost: "--build-boost"
            secp256k1: "--build-secp256k1"
            options: " --enable-isystem"

          - image: ubuntu-24.04
            config: "release"
            link: "dynamic"
            cc: "gcc"
            cxx: "gcc++"
            flags: ""
            coverage: ""
            boost: "--build-boost"
            secp256k1: "--build-secp256k1"
            options: " --enable-isystem"

          - image: ubuntu-24.04
            config: "debug"
            link: "static"
            cc: "gcc"
            cxx: "gcc++"
            flags: ""
            coverage: ""
            boost: "--build-boost"
            secp256k1: "--build-secp256k1"
            options: " --enable-isystem"

    runs-on: ${{ matrix.image }}

    env:
      CC: '${{ matrix.cc }}'
      CXX: '${{ matrix.cxx }}'
      CFLAGS: '${{ matrix.flags }}'
      CXXFLAGS: '${{ matrix.flags }}'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Sources directory path assignment
        shell: bash
        run: |
          cd ..
          echo SRC_PATH="$(pwd)" >> $GITHUB_ENV

      - name: Prepare toolchain [linux]
        if: ${{ startsWith(matrix.image, 'ubuntu') }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install git build-essential autoconf automake libtool pkg-config ${{ matrix.package || '' }}
          if [[ -n "${{ matrix.coverage }}" == "lcov" ]]; then
              sudo apt-get install lcov
          fi

      - name: Prepare toolchain [macos]
        if: ${{ startsWith(matrix.image, 'macos') }}
        shell: bash
        run: |
          brew install autoconf automake libtool ${{ matrix.package || '' }}
          if [[ -n "${{ matrix.llvm }}" ]]; then
              echo "PATH=/opt/homebrew/opt/${{ matrix.llvm }}/bin:${PATH}" >> $GITHUB_ENV
          fi

      - name: Environmental Computation
        shell: bash
        run: |
          if [[ ${{ matrix.link }} == 'dynamic' ]]; then
              echo "LDFLAGS=-Wl,-rpath,${{ env.SRC_PATH }}/prefix/lib" >> $GITHUB_ENV
          fi

      - name: Execute installation
        shell: bash
        run: |
          ./builds/gnu/install-gnu.sh
            --prefix=${{ env.SRC_PATH }}/prefix
            --build-src-dir=${{ env.SRC_PATH }}
            --build-obj-dir="obj"
            --build-obj-dir-relative
            --build-use-local-src
            --build-config=${{ matrix.config }}
            --build-link=${{ matrix.link }}
            ${{ matrix.boost }}
            ${{ matrix.secp256k1 }}

      - name: Coverage calculation
        if: ${{ matrix.coverage == 'lcov' }}
        shell: bash
        run: |
          lcov --ignore-errors version,gcov,mismatch,mismatch --directory . --capture --output-file coverage.info
          lcov --ignore-errors unused --remove coverage.info "${{ env.SRC_PATH }}/prefix/*" "${{ github.workspace }}/examples/*" "${{ github.workspace }}/test/*"  --output-file coverage.info

      - name: Coveralls.io upload
        if: ${{ matrix.coverage == 'lcov' }}
        uses: coverallsapp/github-action@v2.3.6
        with:
          format: lcov
          files: "./coverage.info"
          github-token: ${{ secrets.github_token }}

  cmake:
    strategy:
      fail-fast: false

      matrix:
        include:
          - image: macos-latest
            config: "debug"
            link: "dynamic"
            cc: ""
            cxx: ""
            flags: ""
            coverage: ""
            boost: "--build-boost"
            secp256k1: "--build-secp256k1"
            options: ""

          - image: macos-latest
            config: "debug"
            link: "static"
            cc: ""
            cxx: ""
            flags: ""
            coverage: ""
            boost: "--build-boost"
            secp256k1: "--build-secp256k1"
            options: ""

          - image: ubuntu-24.04
            config: "debug"
            link: "dynamic"
            cc: "clang-18"
            cxx: "clang++-18"
            flags: ""
            coverage: ""
            boost: "--build-boost"
            secp256k1: "--build-secp256k1"
            options: ""

          - image: ubuntu-24.04
            config: "release"
            link: "static"
            cc: "clang-18"
            cxx: "clang++-18"
            flags: ""
            coverage: ""
            boost: "--build-boost"
            secp256k1: "--build-secp256k1"
            options: ""

          - image: ubuntu-24.04
            config: "release"
            link: "dynamic"
            cc: "gcc-12"
            cxx: "gcc++-12"
            flags: ""
            coverage: ""
            boost: "--build-boost"
            secp256k1: "--build-secp256k1"
            options: ""

          - image: ubuntu-24.04
            config: "release"
            link: "dynamic"
            cc: "gcc"
            cxx: "gcc++"
            flags: ""
            coverage: ""
            boost: "--build-boost"
            secp256k1: "--build-secp256k1"
            options: ""

          - image: ubuntu-24.04
            config: "debug"
            link: "static"
            cc: "gcc"
            cxx: "gcc++"
            flags: ""
            coverage: ""
            boost: "--build-boost"
            secp256k1: "--build-secp256k1"
            options: ""

    runs-on: ${{ matrix.image }}

    env:
      CC: '${{ matrix.cc }}'
      CXX: '${{ matrix.cxx }}'
      CFLAGS: '${{ matrix.flags }}'
      CXXFLAGS: '${{ matrix.flags }}'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Sources directory path assignment
        shell: bash
        run: |
          cd ..
          echo SRC_PATH="$(pwd)" >> $GITHUB_ENV

      - name: Prepare toolchain [linux]
        if: ${{ startsWith(matrix.image, 'ubuntu') }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install git build-essential autoconf automake libtool pkg-config ${{ matrix.package || '' }}
          if [[ -n "${{ matrix.coverage }}" == "lcov" ]]; then
              sudo apt-get install lcov
          fi

      - name: Prepare toolchain [macos]
        if: ${{ startsWith(matrix.image, 'macos') }}
        shell: bash
        run: |
          brew install autoconf automake libtool ${{ matrix.package || '' }}
          if [[ -n "${{ matrix.llvm }}" ]]; then
              echo "PATH=/opt/homebrew/opt/${{ matrix.llvm }}/bin:${PATH}" >> $GITHUB_ENV
          fi

      - name: Environmental Computation
        shell: bash
        run: |
          if [[ ${{ matrix.link }} == 'dynamic' ]]; then
              echo "LDFLAGS=-Wl,-rpath,${{ env.SRC_PATH }}/prefix/lib" >> $GITHUB_ENV
          fi

      - name: Execute installation
        shell: bash
        run: |
          ./builds/cmake/install-cmake.sh
            --prefix=${{ ${{ env.SRC_PATH }}/prefix
            --build-src-dir=${{ env.SRC_PATH }}
            --build-obj-dir="obj"
            --build-obj-dir-relative
            --build-use-local-src
            --build-config=${{ matrix.config }}
            --build-link=${{ matrix.link }}
            ${{ matrix.boost }}
            ${{ matrix.secp256k1 }}

      - name: Coverage calculation
        if: ${{ matrix.coverage == 'lcov' }}
        shell: bash
        run: |
          lcov --ignore-errors version,gcov,mismatch,mismatch --directory . --capture --output-file coverage.info
          lcov --ignore-errors unused --remove coverage.info "${{ env.SRC_PATH }}/prefix/*" "${{ github.workspace }}/examples/*" "${{ github.workspace }}/test/*"  --output-file coverage.info

      - name: Coveralls.io upload
        if: ${{ matrix.coverage == 'lcov' }}
        uses: coverallsapp/github-action@v2.3.6
        with:
          format: lcov
          files: "./coverage.info"
          github-token: ${{ secrets.github_token }}
